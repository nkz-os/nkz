apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-host
  namespace: nekazari
  labels:
    app: frontend-host
    layer: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-host
  template:
    metadata:
      labels:
        app: frontend-host
    spec:
      containers:
      - name: host
        image: ghcr.io/nkz-os/nkz/host:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-host-service
  namespace: nekazari
spec:
  selector:
    app: frontend-host
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
