apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-host
  namespace: nekazari
  labels:
    app: frontend-host
    layer: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-host
  template:
    metadata:
      labels:
        app: frontend-host
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: host
        image: ghcr.io/k8-benetis/nkz/host:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-host-service
  namespace: nekazari
spec:
  selector:
    app: frontend-host
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-host-ingress
  namespace: nekazari
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - nekazari.robotika.cloud
    secretName: nekazari-frontend-tls
  rules:
  - host: nekazari.robotika.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-host-service
            port:
              number: 80
