# =============================================================================
# Secret Template for Module Lifecycle Webhook HMAC
# =============================================================================
# IMPORTANT: This file is only a TEMPLATE
# DO NOT include real values in Git
#
# To create the real Secret on the server:
# kubectl create secret generic module-lifecycle-secret \
#   --from-literal=LIFECYCLE_WEBHOOK_SECRET=$(openssl rand -base64 32) \
#   -n nekazari
#
# Both entity-manager (sender) and module backends (receiver) must share
# the same HMAC key.
apiVersion: v1
kind: Secret
metadata:
  name: module-lifecycle-secret
  namespace: nekazari
  labels:
    component: lifecycle
type: Opaque
stringData:
  LIFECYCLE_WEBHOOK_SECRET: "REPLACE_WITH_LIFECYCLE_WEBHOOK_SECRET"
