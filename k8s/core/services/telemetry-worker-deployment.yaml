apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-worker
  namespace: nekazari
  labels:
    app: telemetry-worker
    layer: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: telemetry-worker
  template:
    metadata:
      labels:
        app: telemetry-worker
        layer: backend
    spec:
      containers:
        - name: telemetry-worker
          image: ghcr.io/nkz-os/nkz/telemetry-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            - name: SERVICE_HOST
              value: "telemetry-worker-service"
            - name: SERVICE_PORT
              value: "80"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-worker-service
  namespace: nekazari
  labels:
    app: telemetry-worker
spec:
  selector:
    app: telemetry-worker
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
