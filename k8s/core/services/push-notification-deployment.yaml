---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-notification
  namespace: nekazari
  labels:
    app: push-notification
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: push-notification
  template:
    metadata:
      labels:
        app: push-notification
    spec:
      containers:
        - name: push-notification
          image: ghcr.io/nkz-os/nkz/push-notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: module-secrets
                  key: management-key
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
                  optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: push-notification-service
  namespace: nekazari
  labels:
    app: push-notification
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: push-notification
