name: Build and Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "apps/host/**"
      - "packages/sdk/**"
      - "packages/ui-kit/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter nekazari-frontend build

      - name: Install mc (MinIO Client)
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

      - name: Configure SSH tunnel and deploy to MinIO
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # SSH tunnel: forward local 9000 to MinIO ClusterIP inside K8s
          ssh -f -N -L 9000:10.43.127.191:9000 \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST"

          # Configure mc alias via tunnel
          mc alias set deploy http://localhost:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

          # Deploy
          mc mirror --overwrite --remove apps/host/dist/ deploy/nekazari-frontend/host/

          echo "Frontend deployed successfully"
