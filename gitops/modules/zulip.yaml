apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zulip
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nkz-os/nkz-module-zulip
    targetRevision: HEAD
    path: k8s
    directory:
      exclude: '{configmap.yaml,zulip-ingress.yaml,secret-template.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
