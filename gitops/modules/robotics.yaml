apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robotics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nkz-os/nkz-module-robotics
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
