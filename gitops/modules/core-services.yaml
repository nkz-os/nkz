apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-services
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nkz-os/nkz
    targetRevision: HEAD
    path: k8s/core/services
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
