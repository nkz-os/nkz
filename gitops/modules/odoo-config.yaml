apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: odoo-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k8-benetis/nkz
    targetRevision: HEAD
    path: gitops/overlays/odoo
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
