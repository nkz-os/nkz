apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cadastral
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/k8-benetis/catastro-sp-module-nekazari
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nekazari
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
